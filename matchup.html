<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Matchup Page</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="matchup-page">
    <a href="index.html" class="back-button">← Back to MU Chart</a>

    <section class="hero-card">
      <p class="eyebrow">Pokémon Trainer Matchup</p>
      <h1 id="character-name">Character</h1>
      <div id="score-badge" class="score-badge">Score</div>
    </section>

    <section class="content-card">
      <h2>🧠 Matchup Summary</h2>
      <p id="summary"></p>
    </section>

    <section class="content-card">
      <h2>🎯 Hitboxes / Key Moves</h2>
      <img id="hitbox-image" class="hitbox-image" src="" alt="" />
    </section>

    <section class="pokemon-grid">
      <article class="pokemon-card squirtle-card">
        <h2>💧 Squirtle</h2>

        <h3 class="neutral-title">Neutral</h3>
        <p id="squirtle-neutral"></p>

        <h3 class="advantage-title">Advantage</h3>
        <p id="squirtle-advantage"></p>

        <h3 class="disadvantage-title">Disadvantage</h3>
        <p id="squirtle-disadvantage"></p>
      </article>

      <article class="pokemon-card ivysaur-card">
        <h2>🌿 Ivysaur</h2>

        <h3 class="neutral-title">Neutral</h3>
        <p id="ivysaur-neutral"></p>

        <h3 class="advantage-title">Advantage</h3>
        <p id="ivysaur-advantage"></p>

        <h3 class="disadvantage-title">Disadvantage</h3>
        <p id="ivysaur-disadvantage"></p>
      </article>

      <article class="pokemon-card charizard-card">
        <h2>🔥 Charizard</h2>

        <h3 class="neutral-title">Neutral</h3>
        <p id="charizard-neutral"></p>

        <h3 class="advantage-title">Advantage</h3>
        <p id="charizard-advantage"></p>

        <h3 class="disadvantage-title">Disadvantage</h3>
        <p id="charizard-disadvantage"></p>
      </article>
    </section>
  </main>

  <script src="data.js"></script>
  <script src="matchup.js"></script>
</body>
</html>
